<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Viewer</title>
    <link rel="stylesheet" href="styles/viewer.css" />
  </head>
  <body class="viewer-body">
    <header class="topbar">
      <h1>Markdown Viewer</h1>
      <div class="actions">
        <label for="theme-select" class="preset-label">Theme</label>
        <select id="theme-select" class="preset-select" title="UI color theme" aria-label="UI theme">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
        <label for="preset-select" class="preset-label">Preset</label>
        <select id="preset-select" class="preset-select" title="Document style preset">
          <option value="">—</option>
        </select>
        <button id="open-file-btn" type="button">Open File</button>
        <button id="refresh-btn" type="button">Reparse</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel sidebar-panel" aria-label="문서 탐색">
        <div class="sidebar-tabs" role="tablist" aria-label="사이드바 탭">
          <button
            id="sidebar-tab-recent"
            class="sidebar-tab"
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="sidebar-panel-recent"
          >
            Recent
          </button>
          <button
            id="sidebar-tab-outline"
            class="sidebar-tab"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="sidebar-panel-outline"
          >
            Outline
          </button>
        </div>
        <div
          id="sidebar-panel-recent"
          class="sidebar-tab-panel"
          role="tabpanel"
          aria-labelledby="sidebar-tab-recent"
        >
          <ul id="recent-list" class="nav-tree"></ul>
        </div>
        <div
          id="sidebar-panel-outline"
          class="sidebar-tab-panel is-hidden"
          role="tabpanel"
          aria-labelledby="sidebar-tab-outline"
        >
          <ul id="toc-list" class="nav-tree"></ul>
        </div>
      </aside>

      <section class="panel content-panel">
        <div id="status-line">Ready. Select a markdown file.</div>
        <article id="content-root"></article>
      </section>
    </main>

    <script src="lib/vendor/markdown-it.min.js"></script>
    <script src="lib/vendor/purify.min.js"></script>
    <script type="module" src="viewer.js"></script>
  </body>
</html>
